name: Build git217 image

on:
  push:
    branches: [main]
    paths:
      - "test/docker/git217.Dockerfile"
      - "test/docker/entrypoint.sh"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: |
          HASH=$(cat test/docker/git217.Dockerfile test/docker/entrypoint.sh | sha256sum | cut -c1-16)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: test/docker/
          file: test/docker/git217.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/git217:latest
            ghcr.io/${{ github.repository }}/git217:${{ steps.tag.outputs.hash }}
